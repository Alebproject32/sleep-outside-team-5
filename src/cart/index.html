<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Cart</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/cart.js" type="module"></script>
  </head>

  <body class="cart-page">
    <!-- Dynamic header (loaded with loadHeaderFooter) -->
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>My Cart</h2>
        <ul class="product-list">
          <!-- Cart items will be inserted here dynamically -->
        </ul>

        <!-- Cart totals and checkout button -->
        <div class="cart-footer">
          <p class="cart-total">Total: <span id="cart-total">$0.00</span></p>
          <a href="/checkout/index.html" class="checkout-button">Proceed to Checkout</a>
        </div>
      </section>
    </main>

    <!-- Dynamic footer (loaded with loadHeaderFooter) -->
    <footer id="main-footer"></footer>
  </body>
</html>
