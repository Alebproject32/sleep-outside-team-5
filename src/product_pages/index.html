<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <!-- Dynamic header (loaded with loadHeaderFooter) -->
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="product-detail">
        <!-- Dynamic product elements (filled with JS) -->
        <h3 id="productBrand"></h3>
        <h2 id="productName"></h2>
        <img id="productImage" src="" alt="" />
        <p class="product-card__price" id="productPrice"></p>
        <p id="productDescription"></p>
        <button id="addToCart" data-id="">Add to Cart</button>
      </section>
    </main>

    <!-- Dynamic footer (loaded with loadHeaderFooter) -->
    <footer id="main-footer"></footer>
  </body>
</html>
