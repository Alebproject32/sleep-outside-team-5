<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <!-- Dynamic header (loaded with loadHeaderFooter) -->
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <!-- Cart summary and form will be displayed here -->
        <form name="checkout" id="checkout-form">
          <fieldset>
            <legend>Shipping Address</legend>
            <label
              >First Name
              <input
                type="text"
                name="fname"
                required
                pattern="[A-Za-z\s]+"
                title="Please, submit only letters."
            /></label>
            <label
              >Last Name
              <input
                type="text"
                name="lname"
                required
                pattern="[A-Za-z\s]+"
                title="Please, submit only letters."
            /></label>
            <label>Street <input type="text" name="street" required /></label>
            <label
              >City
              <input
                type="text"
                name="city"
                required
                pattern="[A-Za-z\s]+"
                title="Please, submit only letters."
            /></label>
            <label
              >State
              <input
                type="text"
                name="state"
                required
                pattern="[A-Za-z\s]+"
                title="Please, submit only letters."
            /></label>
            <label
              >Zip
              <input
                type="text"
                id="zip"
                name="zip"
                required
                pattern="\d{4,10}"
                title="Zip code must be a number."
            /></label>
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label
              >Card Number
              <input
                type="text"
                name="cardNumber"
                required
                pattern="\d{16}"
                title="The card must have 16 digits."
            /></label>
            <label
              >Expiration
              <input type="text" name="expiration" required value="08/26"
            /></label>
            <label
              >Code
              <input
                type="text"
                id="zip"
                name="code"
                required
                pattern="\d{4,10}"
                title="Zip code must be a number."
            /></label>
          </fieldset>

          <fieldset id="order-summary">
            <legend>Order Summary</legend>
            <p>Item Subtotal: <span id="subtotal"></span></p>
            <p>Shipping Estimate: <span id="shipping"></span></p>
            <p>Tax: <span id="tax"></span></p>
            <p class="order-total-container">
              <strong>Order Total: <span id="orderTotal"></span></strong>
            </p>
          </fieldset>

          <button type="submit" id="checkoutSubmit">Checkout</button>
        </form>
        <!-- <div id="checkout-content"></div> -->
      </section>
    </main>

    <!-- Dynamic footer (loaded with loadHeaderFooter) -->
    <footer id="main-footer"></footer>
  </body>
</html>
